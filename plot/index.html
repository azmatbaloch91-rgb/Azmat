<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3SDDRELRNP"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-3SDDRELRNP');
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پلاٹ سائز کنورٹر</title>
    
    <!-- Tailwind CSS (Styling ke liye) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React aur ReactDOM (Framework ke liye) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (JSX ko browser mein run karne ke liye) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Custom Fonts -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Inter:wght@400;500;600&display=swap');
        .font-urdu {
            font-family: 'Noto Nastaliq Urdu', 'Inter', sans-serif;
            line-height: 2;
        }
        .font-sans-num {
            font-family: 'Inter', sans-serif;
        }
        /* Number input se arrows (spinners) hatane ke liye */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-urdu">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Icons (Lucide-react ki jagah direct SVG icons banaye gaye hain taake aasaani se chalein)
        const MapIcon = ({ size = 24, strokeWidth = 2 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon><line x1="9" y1="3" x2="9" y2="18"></line><line x1="15" y1="6" x2="15" y2="21"></line></svg>
        );
        const RulerIcon = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.3 15.3l-12-12a2 2 0 0 0-2.828 0l-2.828 2.828a2 2 0 0 0 0 2.828l12 12a2 2 0 0 0 2.828 0l2.828-2.828a2 2 0 0 0 0-2.828z"></path><path d="M6 10l2-2"></path><path d="M10 14l2-2"></path><path d="M14 18l2-2"></path></svg>
        );
        const CalculatorIcon = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="8" y1="6" x2="16" y2="6"></line><line x1="16" y1="14" x2="16" y2="18"></line><path d="M8 10h.01"></path><path d="M12 10h.01"></path><path d="M16 10h.01"></path><path d="M8 14h.01"></path><path d="M12 14h.01"></path><path d="M8 18h.01"></path><path d="M12 18h.01"></path></svg>
        );
        const RefreshCwIcon = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
        );
        const InfoIcon = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
        );
        const ArrowRightLeftIcon = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 3l4 4-4 4"></path><path d="M20 7H4"></path><path d="M8 21l-4-4 4-4"></path><path d="M4 17h16"></path></svg>
        );
        const SquareIcon = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
        );

        // Input Component (Dobara use karne ke liye)
        const InputField = ({ label, value, onChange, unit, fullWidth = false }) => (
            <div className={`flex flex-col ${fullWidth ? 'md:col-span-2' : ''}`}>
                <label className="text-gray-700 font-bold mb-2 flex items-center">
                {label} 
                <span className="text-xs text-gray-500 font-sans-num tracking-wide mr-2 pr-2 border-r border-gray-300">
                    ({unit})
                </span>
                </label>
                <div className="relative">
                <input
                    type="number"
                    value={value}
                    onChange={onChange}
                    className="w-full border border-gray-300 rounded-xl p-3 sm:p-4 text-xl sm:text-2xl focus:ring-2 focus:ring-green-500 focus:border-green-500 font-sans-num text-left text-gray-800 bg-gray-50 transition-all shadow-inner hover:bg-white focus:bg-white placeholder-gray-300 outline-none"
                    placeholder="0.00"
                    dir="ltr"
                    min="0"
                />
                </div>
            </div>
        );

        // Main Application
        function App() {
            const [marlaSize, setMarlaSize] = useState(225);
            const [sqFt, setSqFt] = useState('');

            // Pamaish (Length/Width) ke liye states
            const [plotType, setPlotType] = useState('simple');
            const [l1, setL1] = useState('');
            const [l2, setL2] = useState('');
            const [w1, setW1] = useState('');
            const [w2, setW2] = useState('');

            // Jab lambai ya chorai badle to khud area (sqFt) calculate karein
            useEffect(() => {
                if (plotType === 'simple') {
                    if (l1 !== '' && w1 !== '') {
                        setSqFt(parseFloat(l1) * parseFloat(w1));
                    }
                } else {
                    if (l1 !== '' && l2 !== '' && w1 !== '' && w2 !== '') {
                        const avgL = (parseFloat(l1) + parseFloat(l2)) / 2;
                        const avgW = (parseFloat(w1) + parseFloat(w2)) / 2;
                        setSqFt(avgL * avgW);
                    }
                }
            }, [l1, l2, w1, w2, plotType]);

            // Direct input change ko handle karne ka function
            const handleUnitChange = (unit, value) => {
                if (value === '' || parseFloat(value) < 0) {
                    setSqFt('');
                    return;
                }
                
                const numValue = parseFloat(value);
                let newSqFt = 0;

                switch (unit) {
                case 'sqFt':
                    newSqFt = numValue;
                    break;
                case 'sqYd':
                    newSqFt = numValue * 9;
                    break;
                case 'marla':
                    newSqFt = numValue * marlaSize;
                    break;
                case 'kanal':
                    newSqFt = numValue * marlaSize * 20;
                    break;
                case 'acre':
                    newSqFt = numValue * marlaSize * 160;
                    break;
                default:
                    newSqFt = 0;
                }
                setSqFt(newSqFt);
            };

            // Values ko format karna (Decimals ko chota karne ke liye)
            const formatValue = (val) => {
                if (val === '') return '';
                return parseFloat(Number(val).toFixed(4)).toString();
            };

            // Calculated values
            const vals = {
                sqFt: sqFt === '' ? '' : formatValue(sqFt),
                sqYd: sqFt === '' ? '' : formatValue(sqFt / 9),
                marla: sqFt === '' ? '' : formatValue(sqFt / marlaSize),
                kanal: sqFt === '' ? '' : formatValue(sqFt / (marlaSize * 20)),
                acre: sqFt === '' ? '' : formatValue(sqFt / (marlaSize * 160)),
            };

            // Sab clear karne ka function
            const clearAll = () => {
                setSqFt('');
                setL1('');
                setL2('');
                setW1('');
                setW2('');
            };

            return (
                <div className="min-h-screen flex flex-col items-center py-10 px-4 sm:px-6 lg:px-8">
                    <div className="w-full max-w-3xl">
                        
                        {/* Header Section */}
                        <div className="text-center mb-10">
                            <div className="inline-flex items-center justify-center p-4 bg-green-100 rounded-full mb-4 text-green-600 shadow-sm">
                                <MapIcon size={40} strokeWidth={1.5} />
                            </div>
                            <h1 className="text-3xl sm:text-4xl font-bold text-gray-900 mb-3">
                                پلاٹ سائز کنورٹر
                            </h1>
                            <p className="text-lg text-gray-600">
                                مرلہ، کنال، اور مربع فٹ کو آسانی سے تبدیل کریں
                            </p>
                        </div>

                        {/* Lambai aur Chorai enter karne ka card */}
                        <div className="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 mb-8 transition-all hover:shadow-2xl">
                            <div className="bg-blue-600 p-4 sm:p-6 text-white flex flex-col sm:flex-row items-center justify-between gap-4">
                                <div className="flex items-center gap-3">
                                    <RulerIcon size={24} />
                                    <div>
                                        <h2 className="text-xl font-bold">پیمائش درج کریں (فیتے سے ناپ کر)</h2>
                                        <p className="text-sm text-blue-100 mt-1">فٹ (Feet) میں لمبائی اور چوڑائی لکھیں</p>
                                    </div>
                                </div>
                                
                                {/* Plot ki type select karein */}
                                <div className="flex bg-blue-700/50 rounded-lg p-1 border border-blue-500 w-full sm:w-auto overflow-hidden">
                                    <button 
                                        onClick={() => setPlotType('simple')}
                                        className={`flex-1 sm:flex-none px-4 py-2 rounded-md text-sm font-bold transition-all ${plotType === 'simple' ? 'bg-white text-blue-700 shadow-sm' : 'text-white hover:bg-blue-600'}`}
                                    >
                                        سیدھا پلاٹ (چکور)
                                    </button>
                                    <button 
                                        onClick={() => setPlotType('irregular')}
                                        className={`flex-1 sm:flex-none px-4 py-2 rounded-md text-sm font-bold transition-all ${plotType === 'irregular' ? 'bg-white text-blue-700 shadow-sm' : 'text-white hover:bg-blue-600'}`}
                                    >
                                        ٹیڑھا پلاٹ (4 اطراف)
                                    </button>
                                </div>
                            </div>

                            <div className="p-6 sm:p-8 bg-blue-50/30">
                                {plotType === 'simple' ? (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <InputField 
                                            label="لمبائی (Length)" 
                                            unit="Feet" 
                                            value={l1} 
                                            onChange={(e) => setL1(e.target.value)} 
                                        />
                                        <InputField 
                                            label="چوڑائی (Width)" 
                                            unit="Feet" 
                                            value={w1} 
                                            onChange={(e) => setW1(e.target.value)} 
                                        />
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-8">
                                        <div className="space-y-4 p-4 bg-white rounded-xl border border-gray-200 shadow-sm">
                                            <h3 className="font-bold text-gray-700 flex items-center gap-2 border-b pb-2">
                                                <ArrowRightLeftIcon size={18} className="text-blue-500" /> لمبائی کی پیمائش
                                            </h3>
                                            <InputField 
                                                label="ایک طرف کی لمبائی" 
                                                unit="Feet" 
                                                value={l1} 
                                                onChange={(e) => setL1(e.target.value)} 
                                            />
                                            <InputField 
                                                label="دوسری طرف کی لمبائی" 
                                                unit="Feet" 
                                                value={l2} 
                                                onChange={(e) => setL2(e.target.value)} 
                                            />
                                        </div>
                                        <div className="space-y-4 p-4 bg-white rounded-xl border border-gray-200 shadow-sm">
                                            <h3 className="font-bold text-gray-700 flex items-center gap-2 border-b pb-2">
                                                <SquareIcon size={18} className="text-blue-500" /> چوڑائی کی پیمائش
                                            </h3>
                                            <InputField 
                                                label="ایک طرف کی چوڑائی" 
                                                unit="Feet" 
                                                value={w1} 
                                                onChange={(e) => setW1(e.target.value)} 
                                            />
                                            <InputField 
                                                label="دوسری طرف کی چوڑائی" 
                                                unit="Feet" 
                                                value={w2} 
                                                onChange={(e) => setW2(e.target.value)} 
                                            />
                                        </div>
                                    </div>
                                )}
                                
                                <div className="mt-6 p-4 bg-yellow-50 rounded-lg text-yellow-800 text-sm sm:text-base border border-yellow-200 flex gap-3 items-start">
                                    <InfoIcon size={24} className="shrink-0 text-yellow-600 mt-0.5" />
                                    <p>
                                        <strong>ہدایت:</strong> فیتے (Inch Tape) کی مدد سے زمین کو فٹوں میں ناپ کر اوپر لکھیں۔ 
                                        نیچے والے سبز خانے میں آپ کا کل رقبہ، مرلہ، اور کنال خودبخود نکل آئے گا۔
                                    </p>
                                </div>
                            </div>
                        </div>

                        {/* Result / Main Calculator Card */}
                        <div className="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 mb-8 transition-all hover:shadow-2xl">
                            <div className="bg-green-600 p-4 sm:p-6 text-white flex flex-col sm:flex-row items-center justify-between gap-4">
                                <div className="flex items-center gap-3">
                                    <CalculatorIcon size={24} />
                                    <h2 className="text-xl font-bold">کل رقبہ اور نتیجہ</h2>
                                </div>
                                
                                {/* Marla Size Selector */}
                                <div className="flex items-center bg-green-700/50 rounded-lg p-2 px-4 w-full sm:w-auto border border-green-500">
                                    <label htmlFor="marla-size" className="whitespace-nowrap ml-3 font-semibold text-sm">
                                        مرلے کا معیار:
                                    </label>
                                    <select
                                        id="marla-size"
                                        className="bg-transparent text-white focus:outline-none font-sans-num text-sm sm:text-base cursor-pointer"
                                        value={marlaSize}
                                        onChange={(e) => setMarlaSize(parseFloat(e.target.value))}
                                        dir="ltr"
                                    >
                                        <option className="text-gray-900" value={225}>225 Sq Ft (شہری)</option>
                                        <option className="text-gray-900" value={272.25}>272.25 Sq Ft (دیہی)</option>
                                    </select>
                                </div>
                            </div>

                            <div className="p-6 sm:p-8">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <InputField 
                                        label="مربع فٹ" 
                                        unit="Sq. Feet" 
                                        value={vals.sqFt} 
                                        onChange={(e) => handleUnitChange('sqFt', e.target.value)} 
                                    />
                                    <InputField 
                                        label="مربع گز" 
                                        unit="Sq. Yards" 
                                        value={vals.sqYd} 
                                        onChange={(e) => handleUnitChange('sqYd', e.target.value)} 
                                    />
                                    <InputField 
                                        label="مرلہ" 
                                        unit="Marla" 
                                        value={vals.marla} 
                                        onChange={(e) => handleUnitChange('marla', e.target.value)} 
                                    />
                                    <InputField 
                                        label="کنال" 
                                        unit="Kanal" 
                                        value={vals.kanal} 
                                        onChange={(e) => handleUnitChange('kanal', e.target.value)} 
                                    />
                                    <InputField 
                                        label="ایکڑ" 
                                        unit="Acre" 
                                        value={vals.acre} 
                                        onChange={(e) => handleUnitChange('acre', e.target.value)} 
                                        fullWidth
                                    />
                                </div>

                                <div className="mt-8 flex justify-end border-t pt-6">
                                    <button
                                        onClick={clearAll}
                                        className="flex items-center gap-2 px-6 py-3 bg-red-50 hover:bg-red-100 text-red-600 rounded-lg font-bold transition-colors focus:ring-4 focus:ring-red-100"
                                    >
                                        <RefreshCwIcon size={20} />
                                        <span>ری سیٹ کریں</span>
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Information Guide Card */}
                        <div className="bg-blue-50 rounded-2xl p-6 sm:p-8 border border-blue-100 shadow-sm text-blue-900">
                            <div className="flex items-center gap-3 mb-4">
                                <InfoIcon size={28} className="text-blue-600" />
                                <h3 className="text-2xl font-bold text-blue-800">کیا آپ جانتے ہیں؟</h3>
                            </div>
                            
                            <div className="grid sm:grid-cols-2 gap-x-8 gap-y-4 mt-6">
                                <ul className="space-y-3 list-disc list-inside marker:text-blue-400">
                                    <li><strong className="font-bold">1 کنال</strong> = 20 مرلے</li>
                                    <li><strong className="font-bold">1 ایکڑ</strong> = 8 کنال (160 مرلے)</li>
                                    <li><strong className="font-bold">1 مربع گز</strong> = 9 مربع فٹ</li>
                                </ul>
                                <ul className="space-y-3 list-disc list-inside marker:text-blue-400">
                                    <li>
                                        <strong className="font-bold">شہری علاقوں</strong> (ہاؤسنگ سوسائٹیز) میں 1 مرلہ عموماً <span className="font-sans-num font-bold">225</span> مربع فٹ کا ہوتا ہے۔
                                    </li>
                                    <li>
                                        <strong className="font-bold">دیہی علاقوں</strong> (ریونیو ریکارڈ) میں 1 مرلہ عموماً <span className="font-sans-num font-bold">272.25</span> مربع فٹ کا ہوتا ہے۔
                                    </li>
                                </ul>
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        // React App ko HTML id 'root' mein render karna
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
